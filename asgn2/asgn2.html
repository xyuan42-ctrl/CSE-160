<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Assignment 2 - Blocky Pig</title>
</head>

<body onload="main()">
  <canvas id="webgl" width="500" height="500">
    Please use a browser that supports canvas.
  </canvas>

  <p>
    Camera Angle:
    <input type="range" min="-180" max="180" value="0" id="angleSlide">
  </p>

  <p>
    Arm Angle:
    <input type="range" min="-60" max="60" value="0" id="armSlide">
  </p>

  <p>
    Forearm Angle:
    <input type="range" min="-90" max="90" value="0" id="forearmSlide">
  </p>

  <p>
    Hand Angle:
    <input type="range" min="-45" max="45" value="0" id="handSlide">
  </p>

  <button id="animationOnButton">Animation On</button>
  <button id="animationOffButton">Animation Off</button>

  <p id="fps">FPS: --</p>

  <script src="lib/cuon-matrix.js"></script>
  <script src="lib/cuon-utils.js"></script>
  <script src="Triangle.js"></script>
  <script src="Cube.js"></script>
  <script src="Cylinder.js"></script>
  <script src="asgn2.js"></script>
</body>
</html>
